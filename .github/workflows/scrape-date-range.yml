name: scrape-date-range

on:
  workflow_dispatch:
    inputs:
      mode:
        description: '実行モード'
        required: true
        default: auto
        type: choice
        options:
          - auto
          - full
          - incremental
      from_date:
        description: '開始日を上書きする場合のみ指定 (YYYY/MM/DD)'
        required: false
        type: string
      to_date:
        description: '終了日を上書きする場合のみ指定 (YYYY/MM/DD)'
        required: false
        type: string
      download_race_html:
        description: 'race HTML も保存する'
        required: true
        default: false
        type: boolean
  schedule:
    - cron: '17 20 * * *' # 毎日 05:17 JST

permissions:
  contents: write

concurrency:
  group: scrape-date-range-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Show runner versions
        shell: bash
        run: |
          python --version
          google-chrome --version || true
          chromedriver --version || true

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip wheel
          pip install -r requirements.txt

      - name: Resolve date range (manual override)
        id: range_manual
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.from_date != '' && inputs.to_date != '' }}
        shell: bash
        run: |
          echo "run_mode=${{ inputs.mode }}" >> "$GITHUB_OUTPUT"
          echo "from_date=${{ inputs.from_date }}" >> "$GITHUB_OUTPUT"
          echo "to_date=${{ inputs.to_date }}" >> "$GITHUB_OUTPUT"
          echo "from_date_compact=$(echo '${{ inputs.from_date }}' | tr -d '/-')" >> "$GITHUB_OUTPUT"
          echo "to_date_compact=$(echo '${{ inputs.to_date }}' | tr -d '/-')" >> "$GITHUB_OUTPUT"

      - name: Resolve date range (auto/full/incremental)
        id: range_auto
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.from_date != '' && inputs.to_date != '') }}
        shell: bash
        run: |
          MODE="auto"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="${{ inputs.mode }}"
          fi
          python scripts/resolve_scrape_range.py --mode "$MODE"

      - name: Run scraper
        id: scrape
        shell: bash
        env:
          RUN_MODE: ${{ steps.range_manual.outputs.run_mode || steps.range_auto.outputs.run_mode }}
          FROM_DATE: ${{ steps.range_manual.outputs.from_date || steps.range_auto.outputs.from_date }}
          TO_DATE: ${{ steps.range_manual.outputs.to_date || steps.range_auto.outputs.to_date }}
          DOWNLOAD_RACE_HTML: ${{ (github.event_name == 'workflow_dispatch' && inputs.download_race_html) && 'true' || 'false' }}
        run: |
          set -euo pipefail
          echo "mode=${RUN_MODE}"
          echo "from=${FROM_DATE}"
          echo "to=${TO_DATE}"
          echo "download_race_html=${DOWNLOAD_RACE_HTML}"

          CMD=(python run_scrape_date_range.py --from-date "$FROM_DATE" --to-date "$TO_DATE")
          if [ "$DOWNLOAD_RACE_HTML" = "true" ]; then
            CMD+=(--download-race-html)
          fi

          printf 'command: %q ' "${CMD[@]}"
          echo
          "${CMD[@]}"

      - name: Write persistent state
        if: ${{ success() }}
        shell: bash
        env:
          RUN_MODE: ${{ steps.range_manual.outputs.run_mode || steps.range_auto.outputs.run_mode }}
          FROM_DATE: ${{ steps.range_manual.outputs.from_date || steps.range_auto.outputs.from_date }}
          TO_DATE: ${{ steps.range_manual.outputs.to_date || steps.range_auto.outputs.to_date }}
        run: |
          python scripts/write_scrape_state.py \
            --run-mode "$RUN_MODE" \
            --from-date "$FROM_DATE" \
            --to-date "$TO_DATE"

      - name: Upload artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: scrape-${{ steps.range_manual.outputs.run_mode || steps.range_auto.outputs.run_mode || 'unknown' }}-${{ steps.range_manual.outputs.from_date_compact || steps.range_auto.outputs.from_date_compact || 'na' }}-${{ steps.range_manual.outputs.to_date_compact || steps.range_auto.outputs.to_date_compact || 'na' }}
          path: |
            data/tmp/**/*.csv
            .github/state/*
          if-no-files-found: warn
          retention-days: 30

      - name: Commit updated data and state files
        if: ${{ success() }}
        shell: bash
        env:
          RUN_MODE: ${{ steps.range_manual.outputs.run_mode || steps.range_auto.outputs.run_mode }}
          FROM_DATE: ${{ steps.range_manual.outputs.from_date || steps.range_auto.outputs.from_date }}
          TO_DATE: ${{ steps.range_manual.outputs.to_date || steps.range_auto.outputs.to_date }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A .github/state/ data/

          if git diff --cached --quiet; then
            echo "No data/state changes"
            exit 0
          fi

          git commit -m "chore: update scrape data (${RUN_MODE} ${FROM_DATE}..${TO_DATE})"
          git push
