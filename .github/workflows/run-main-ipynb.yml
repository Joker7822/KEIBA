name: run-main-ipynb

on:
  workflow_dispatch:
    inputs:
      mode:
        description: '実行モード'
        required: true
        default: auto
        type: choice
        options:
          - auto
          - full
          - incremental
      from_date:
        description: '開始日を上書きする場合のみ指定 (YYYY/MM/DD)'
        required: false
        type: string
      to_date:
        description: '終了日を上書きする場合のみ指定 (YYYY/MM/DD)'
        required: false
        type: string
      download_race_html:
        description: 'race HTML も保存する'
        required: true
        default: true
        type: boolean
      overwrite_html:
        description: '既存HTMLも上書き取得する'
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: run-main-ipynb-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-notebook-decomposed:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      TZ: Asia/Tokyo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Show runner versions
        shell: bash
        run: |
          set -euo pipefail
          python --version
          google-chrome --version || true
          chromedriver --version || true
          echo "TZ=${TZ}"
          date

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip wheel
          pip install -r requirements.txt
          pip install "optuna-integration[lightgbm]"
          pip install lxml nbconvert ipykernel

      - name: Resolve date range
        id: range
        shell: bash
        run: |
          set -euo pipefail

          MODE="${{ inputs.mode }}"
          INPUT_FROM="${{ inputs.from_date }}"
          INPUT_TO="${{ inputs.to_date }}"

          TMP_OUTPUT="$(mktemp)"
          export GITHUB_OUTPUT="$TMP_OUTPUT"
          python scripts/resolve_scrape_range.py --mode "$MODE"

          AUTO_RUN_MODE="$(grep '^run_mode=' "$TMP_OUTPUT" | head -n1 | cut -d= -f2-)"
          AUTO_FROM_DATE="$(grep '^from_date=' "$TMP_OUTPUT" | head -n1 | cut -d= -f2-)"
          AUTO_TO_DATE="$(grep '^to_date=' "$TMP_OUTPUT" | head -n1 | cut -d= -f2-)"

          FINAL_FROM_DATE="$AUTO_FROM_DATE"
          FINAL_TO_DATE="$AUTO_TO_DATE"

          if [ -n "$INPUT_FROM" ]; then
            FINAL_FROM_DATE="$INPUT_FROM"
          fi

          if [ -n "$INPUT_TO" ]; then
            FINAL_TO_DATE="$INPUT_TO"
          fi

          echo "run_mode=${AUTO_RUN_MODE}" >> "$GITHUB_STEP_SUMMARY"
          echo "from_date=${FINAL_FROM_DATE}" >> "$GITHUB_STEP_SUMMARY"
          echo "to_date=${FINAL_TO_DATE}" >> "$GITHUB_STEP_SUMMARY"

          {
            echo "run_mode=${AUTO_RUN_MODE}"
            echo "from_date=${FINAL_FROM_DATE}"
            echo "to_date=${FINAL_TO_DATE}"
            echo "from_date_compact=$(echo "${FINAL_FROM_DATE}" | tr -d '/-')"
            echo "to
