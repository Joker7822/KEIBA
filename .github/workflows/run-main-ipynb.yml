name: run-main-ipynb

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: run-main-ipynb-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-notebook:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Show runner versions
        shell: bash
        run: |
          python --version
          google-chrome --version || true
          chromedriver --version || true

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip wheel
          pip install -r requirements.txt
          pip install "optuna-integration[lightgbm]"
          pip install nbconvert ipykernel

      - name: Execute main.ipynb
        shell: bash
        env:
          MPLBACKEND: Agg
          PYTHONUNBUFFERED: "1"
        run: |
          set -euo pipefail
          jupyter nbconvert \
            --to notebook \
            --execute main.ipynb \
            --inplace \
            --ExecutePreprocessor.kernel_name=python3 \
            --ExecutePreprocessor.timeout=-1

      - name: Upload notebook artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: run-main-ipynb-${{ github.run_number }}
          path: |
            main.ipynb
            data/**/*.csv
          if-no-files-found: warn
          retention-days: 30

      - name: Commit updated notebook and data files
        if: ${{ success() }}
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A main.ipynb data/

          if git diff --cached --quiet; then
            echo "No notebook/data changes"
            exit 0
          fi

          git commit -m "chore: update main.ipynb outputs and data"
          git push
