name: run-main-ipynb

on:
  workflow_dispatch:
    inputs:
      mode:
        description: '実行モード'
        required: true
        default: auto
        type: choice
        options:
          - auto
          - full
          - incremental
      from_date:
        description: '開始日を上書きする場合のみ指定 (YYYY/MM/DD)'
        required: false
        type: string
      to_date:
        description: '終了日を上書きする場合のみ指定 (YYYY/MM/DD)'
        required: false
        type: string
      download_race_html:
        description: 'race HTML も保存する'
        required: true
        default: true
        type: boolean
      overwrite_html:
        description: '既存HTMLも上書き取得する'
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: run-main-ipynb-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-notebook-decomposed:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      TZ: Asia/Tokyo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Show runner versions
        shell: bash
        run: |
          set -euo pipefail
          python --version
          google-chrome --version || true
          chromedriver --version || true
          echo "TZ=${TZ}"
          date

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip wheel
          pip install -r requirements.txt
          pip install "optuna-integration[lightgbm]"
          pip install lxml nbconvert ipykernel

      - name: Resolve date range
        id: range
        shell: bash
        run: |
          set -euo pipefail

          MODE="${{ inputs.mode }}"
          INPUT_FROM="${{ inputs.from_date }}"
          INPUT_TO="${{ inputs.to_date }}"

          REAL_GITHUB_OUTPUT="$GITHUB_OUTPUT"
          TMP_OUTPUT="$(mktemp)"
          export GITHUB_OUTPUT="$TMP_OUTPUT"

          python scripts/resolve_scrape_range.py --mode "$MODE"

          export GITHUB_OUTPUT="$REAL_GITHUB_OUTPUT"

          AUTO_RUN_MODE="$(grep '^run_mode=' "$TMP_OUTPUT" | head -n1 | cut -d= -f2- || true)"
          AUTO_FROM_DATE="$(grep '^from_date=' "$TMP_OUTPUT" | head -n1 | cut -d= -f2- || true)"
          AUTO_TO_DATE="$(grep '^to_date=' "$TMP_OUTPUT" | head -n1 | cut -d= -f2- || true)"
          INITIAL_DONE="$(grep '^initial_done=' "$TMP_OUTPUT" | head -n1 | cut -d= -f2- || true)"
          TODAY_JST="$(grep '^today_jst=' "$TMP_OUTPUT" | head -n1 | cut -d= -f2- || true)"

          FINAL_FROM_DATE="$AUTO_FROM_DATE"
          FINAL_TO_DATE="$AUTO_TO_DATE"

          if [ -n "$INPUT_FROM" ]; then
            FINAL_FROM_DATE="$INPUT_FROM"
          fi

          if [ -n "$INPUT_TO" ]; then
            FINAL_TO_DATE="$INPUT_TO"
          fi

          FROM_DATE_COMPACT="$(printf '%s' "$FINAL_FROM_DATE" | tr -d '/-')"
          TO_DATE_COMPACT="$(printf '%s' "$FINAL_TO_DATE" | tr -d '/-')"

          echo "run_mode=${AUTO_RUN_MODE}" >> "$GITHUB_STEP_SUMMARY"
          echo "from_date=${FINAL_FROM_DATE}" >> "$GITHUB_STEP_SUMMARY"
          echo "to_date=${FINAL_TO_DATE}" >> "$GITHUB_STEP_SUMMARY"
          echo "from_date_compact=${FROM_DATE_COMPACT}" >> "$GITHUB_STEP_SUMMARY"
          echo "to_date_compact=${TO_DATE_COMPACT}" >> "$GITHUB_STEP_SUMMARY"
          echo "today_jst=${TODAY_JST}" >> "$GITHUB_STEP_SUMMARY"
          echo "initial_done=${INITIAL_DONE}" >> "$GITHUB_STEP_SUMMARY"

          {
            printf 'run_mode=%s\n' "$AUTO_RUN_MODE"
            printf 'from_date=%s\n' "$FINAL_FROM_DATE"
            printf 'to_date=%s\n' "$FINAL_TO_DATE"
            printf 'from_date_compact=%s\n' "$FROM_DATE_COMPACT"
            printf 'to_date_compact=%s\n' "$TO_DATE_COMPACT"
            printf 'today_jst=%s\n' "$TODAY_JST"
            printf 'initial_done=%s\n' "$INITIAL_DONE"
          } >> "$GITHUB_OUTPUT"

      - name: Execute main.ipynb
        shell: bash
        env:
          RUN_MODE: ${{ steps.range.outputs.run_mode }}
          FROM_DATE: ${{ steps.range.outputs.from_date }}
          TO_DATE: ${{ steps.range.outputs.to_date }}
          DOWNLOAD_RACE_HTML: ${{ inputs.download_race_html }}
          OVERWRITE_HTML: ${{ inputs.overwrite_html }}
        run: |
          set -euo pipefail

          export SCRAPE_RUN_MODE="$RUN_MODE"
          export SCRAPE_FROM_DATE="$FROM_DATE"
          export SCRAPE_TO_DATE="$TO_DATE"
          export SCRAPE_DOWNLOAD_RACE_HTML="$DOWNLOAD_RACE_HTML"
          export SCRAPE_OVERWRITE_HTML="$OVERWRITE_HTML"

          python -m ipykernel install --user --name python3 || true

          jupyter nbconvert \
            --to notebook \
            --execute main.ipynb \
            --output executed_main.ipynb \
            --ExecutePreprocessor.timeout=21600

          jupyter nbconvert \
            --to html executed_main.ipynb \
            --output executed_main.html

      - name: Write scrape state
        if: ${{ success() }}
        shell: bash
        env:
          RUN_MODE: ${{ steps.range.outputs.run_mode }}
          FROM_DATE: ${{ steps.range.outputs.from_date }}
          TO_DATE: ${{ steps.range.outputs.to_date }}
        run: |
          set -euo pipefail
          mkdir -p .github/state
          python scripts/write_scrape_state.py \
            --run-mode "$RUN_MODE" \
            --from-date "$FROM_DATE" \
            --to-date "$TO_DATE"

      - name: Commit and push generated files
        if: ${{ success() }}
        shell: bash
        env:
          RUN_MODE: ${{ steps.range.outputs.run_mode }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          BRANCH_NAME="${GITHUB_REF_NAME}"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: run main.ipynb (${RUN_MODE})"
          git pull --rebase origin "$BRANCH_NAME"
          git push origin "HEAD:${BRANCH_NAME}"

      - name: Upload artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: run-main-ipynb-${{ steps.range.outputs.run_mode || 'unknown' }}-${{ steps.range.outputs.from_date_compact || 'na' }}-${{ steps.range.outputs.to_date_compact || 'na' }}
          path: |
            executed_main.ipynb
            executed_main.html
            .github/state/*
            data/tmp/**/*.csv
            data/tmp/debug_race_list/**/*.html
          if-no-files-found: warn
          retention-days: 30
