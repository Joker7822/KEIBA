name: run-main-ipynb

on:
  workflow_dispatch:
    inputs:
      mode:
        description: '実行モード'
        required: true
        default: auto
        type: choice
        options:
          - auto
          - full
          - incremental
      from_date:
        description: '開始日を上書きする場合のみ指定 (YYYY/MM/DD)'
        required: false
        type: string
      to_date:
        description: '終了日を上書きする場合のみ指定 (YYYY/MM/DD)'
        required: false
        type: string
      download_race_html:
        description: 'race HTML も保存する'
        required: true
        default: true
        type: boolean
      overwrite_html:
        description: '既存HTMLも上書き取得する'
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: run-main-ipynb-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-notebook-decomposed:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Show runner versions
        shell: bash
        run: |
          python --version
          google-chrome --version || true
          chromedriver --version || true

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip wheel
          pip install -r requirements.txt
          pip install "optuna-integration[lightgbm]"
          pip install lxml nbconvert ipykernel

      - name: Resolve date range (manual override)
        id: range_manual
        if: ${{ inputs.from_date != '' && inputs.to_date != '' }}
        shell: bash
        run: |
          echo "run_mode=${{ inputs.mode }}" >> "$GITHUB_OUTPUT"
          echo "from_date=${{ inputs.from_date }}" >> "$GITHUB_OUTPUT"
          echo "to_date=${{ inputs.to_date }}" >> "$GITHUB_OUTPUT"
          echo "from_date_compact=$(echo '${{ inputs.from_date }}' | tr -d '/-')" >> "$GITHUB_OUTPUT"
          echo "to_date_compact=$(echo '${{ inputs.to_date }}' | tr -d '/-')" >> "$GITHUB_OUTPUT"

      - name: Resolve date range (auto/full/incremental)
        id: range_auto
        if: ${{ !(inputs.from_date != '' && inputs.to_date != '') }}
        shell: bash
        run: |
          MODE="${{ inputs.mode }}"
          python scripts/resolve_scrape_range.py --mode "$MODE"

      - name: Build kaisai date list
        id: build_dates
        shell: bash
        env:
          FROM_DATE: ${{ steps.range_manual.outputs.from_date || steps.range_auto.outputs.from_date }}
          TO_DATE: ${{ steps.range_manual.outputs.to_date || steps.range_auto.outputs.to_date }}
        run: |
          set -euo pipefail
          mkdir -p .github/state .github/tmp
          python - <<'PY'
          import os
          from modules import preparing

          from_date = os.environ["FROM_DATE"]
          to_date = os.environ["TO_DATE"]

          dates = preparing.scrape_kaisai_date(from_date, to_date)

          out_path = ".github/tmp/kaisai_dates.txt"
          with open(out_path, "w", encoding="utf-8") as f:
              for d in dates:
                  f.write(f"{d}\n")

          print(f"kaisai_dates_count={len(dates)}")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fo:
              fo.write(f"count={len(dates)}\n")
          PY

      - name: Run decomposed main flow and push after each kaisai_date
        shell: bash
        env:
          RUN_MODE: ${{ steps.range_manual.outputs.run_mode || steps.range_auto.outputs.run_mode }}
          DOWNLOAD_RACE_HTML: ${{ inputs.download_race_html }}
          OVERWRITE_HTML: ${{ inputs.overwrite_html }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          BRANCH_NAME="${GITHUB_REF_NAME}"

          if [ ! -f .github/tmp/kaisai_dates.txt ]; then
            echo "kaisai date list not found"
            exit 1
          fi

          if [ ! -s .github/tmp/kaisai_dates.txt ]; then
            echo "No kaisai dates found. Nothing to do."
            exit 0
          fi

          while IFS= read -r kaisai_date || [ -n "$kaisai_date" ]; do
            [ -z "$kaisai_date" ] && continue

            from_date_fmt="$(echo "$kaisai_date" | sed -E 's#([0-9]{4})([0-9]{2})([0-9]{2})#\1/\2/\3#')"
            to_date_fmt="$from_date_fmt"

            echo "========================================"
            echo "Processing kaisai_date=${kaisai_date}"
            echo "from=${from_date_fmt}"
            echo "to=${to_date_fmt}"
            echo "download_race_html=${DOWNLOAD_RACE_HTML}"
            echo "overwrite_html=${OVERWRITE_HTML}"
            echo "========================================"

            CMD=(python run_scrape_date_range.py --from-date "$from_date_fmt" --to-date "$to_date_fmt")

            if [ "${DOWNLOAD_RACE_HTML}" = "true" ]; then
              CMD+=(--download-race-html)
            fi

            if [ "${OVERWRITE_HTML}" = "true" ]; then
              CMD+=(--overwrite-html)
            fi

            printf 'command: %q ' "${CMD[@]}"
            echo
            "${CMD[@]}"

            python scripts/write_scrape_state.py \
              --run-mode "$RUN_MODE" \
              --from-date "$from_date_fmt" \
              --to-date "$to_date_fmt"

            echo "Merging kaisai_date and race_id_list CSV files..."
            python - <<'PY'
            import glob
            import os
            import pandas as pd

            tmp_dir = os.path.join("data", "tmp")
            os.makedirs(tmp_dir, exist_ok=True)

            def merge_and_cleanup(pattern: str, column_name: str, merged_filename: str) -> None:
                paths = sorted(glob.glob(os.path.join(tmp_dir, pattern)))
                if not paths:
                    return

                frames = []
                used_paths = []

                for path in paths:
                    try:
                        df = pd.read_csv(path, dtype=str)
                    except Exception as exc:
                        print(f"skip unreadable file: {path} ({exc})")
                        continue

                    if column_name not in df.columns:
                        print(f"skip file without column {column_name}: {path}")
                        continue

                    s = (
                        df[column_name]
                        .dropna()
                        .astype(str)
                        .str.strip()
                    )
                    s = s[s != ""]
                    if s.empty:
                        used_paths.append(path)
                        continue

                    frames.append(pd.DataFrame({column_name: s}))
                    used_paths.append(path)

                merged_path = os.path.join(tmp_dir, merged_filename)

                if os.path.exists(merged_path):
                    try:
                        current_df = pd.read_csv(merged_path, dtype=str)
                        if column_name in current_df.columns:
                            s = (
                                current_df[column_name]
                                .dropna()
                                .astype(str)
                                .str.strip()
                            )
                            s = s[s != ""]
                            if not s.empty:
                                frames.insert(0, pd.DataFrame({column_name: s}))
                    except Exception as exc:
                        print(f"failed to read existing merged file {merged_path}: {exc}")

                if not frames:
                    return

                merged_df = (
                    pd.concat(frames, ignore_index=True)
                    .drop_duplicates(subset=[column_name], keep="first")
                    .sort_values(by=[column_name], kind="stable")
                    .reset_index(drop=True)
                )
                merged_df.to_csv(merged_path, index=False, encoding="utf-8-sig")
                print(f"merged: {merged_path} ({len(merged_df)} rows)")

                for path in used_paths:
                    if os.path.abspath(path) == os.path.abspath(merged_path):
                        continue
                    try:
                        os.remove(path)
                        print(f"removed: {path}")
                    except FileNotFoundError:
                        pass
                    except Exception as exc:
                        print(f"failed to remove {path}: {exc}")

            merge_and_cleanup("kaisai_date_*.csv", "kaisai_date", "kaisai_date_all.csv")
            merge_and_cleanup("race_id_list_*.csv", "race_id", "race_id_list_all.csv")
            PY

            git add -A .github/state/ data/

            if git diff --cached --quiet; then
              echo "No changes for ${kaisai_date}. Skip commit/push."
              continue
            fi

            git commit -m "chore: update decomposed main flow (${RUN_MODE} ${kaisai_date})"

            git pull --rebase origin "$BRANCH_NAME"
            git push origin "HEAD:${BRANCH_NAME}"

          done < .github/tmp/kaisai_dates.txt

      - name: Upload artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: run-main-ipynb-${{ steps.range_manual.outputs.run_mode || steps.range_auto.outputs.run_mode || 'unknown' }}-${{ steps.range_manual.outputs.from_date_compact || steps.range_auto.outputs.from_date_compact || 'na' }}-${{ steps.range_manual.outputs.to_date_compact || steps.range_auto.outputs.to_date_compact || 'na' }}
          path: |
            .github/state/*
            .github/tmp/kaisai_dates.txt
            data/tmp/**/*.csv
            data/tmp/debug_race_list/**/*.html
            data/html/**/*.bin
          if-no-files-found: warn
          retention-days: 30
