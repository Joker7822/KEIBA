name: scrape-race-horse-ped

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: scrape-race-horse-ped-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scrape-race-horse-ped:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      TZ: Asia/Tokyo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Show runner versions
        shell: bash
        run: |
          set -euo pipefail
          python --version
          echo "TZ=${TZ}"
          date

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip wheel
          pip install -r requirements.txt
          pip install "optuna-integration[lightgbm]"
          pip install lxml

      - name: Resolve date range
        id: range
        shell: bash
        run: |
          set -euo pipefail
          python scripts/resolve_scrape_range.py >> "$GITHUB_OUTPUT"

          echo "run_mode=${{ steps.range.outputs.run_mode }}" >> "$GITHUB_STEP_SUMMARY"
          echo "from_date=${{ steps.range.outputs.from_date }}" >> "$GITHUB_STEP_SUMMARY"
          echo "to_date=${{ steps.range.outputs.to_date }}" >> "$GITHUB_STEP_SUMMARY"
          echo "today_jst=${{ steps.range.outputs.today_jst }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Configure git
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Scrape only race / horse / ped and push immediately
        shell: bash
        env:
          FROM_DATE: ${{ steps.range.outputs.from_date }}
          TO_DATE: ${{ steps.range.outputs.to_date }}
        run: |
          set -euo pipefail
          mkdir -p data/tmp

          python scripts/scrape_race_horse_ped.py \
            --from-date "$FROM_DATE" \
            --to-date "$TO_DATE" \
            --sleep-seconds 1.2 \
            --git-push \
            2>&1 | tee data/tmp/scrape_race_horse_ped.log

      - name: Upload artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: scrape-race-horse-ped-${{ steps.range.outputs.from_date_compact || 'na' }}-${{ steps.range.outputs.to_date_compact || 'na' }}
          path: |
            data/tmp/scrape_race_horse_ped.log
            data/tmp/scrape_race_horse_ped_summary.json
          if-no-files-found: warn
          retention-days: 30
